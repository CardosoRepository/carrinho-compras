services:
  postgres:
    image: postgres:17-alpine
    container_name: carrinho-compras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carrinho_compras
      POSTGRES_USER: carrinho
      POSTGRES_PASSWORD: carrinho_dev
    ports:
      - "5432:5432"
    volumes:
      - carrinho_compras_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U carrinho -d carrinho_compras
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  carrinho_compras_postgres_data: