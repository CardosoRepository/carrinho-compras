services:
  postgres:
    image: postgres:17-alpine
    container_name: carrinho-compras-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: carrinho_compras
      POSTGRES_USER: carrinho
      POSTGRES_PASSWORD: carrinho_dev

    ports:
      - "5432:5432"

    volumes:
      - carrinho_compras_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U carrinho -d carrinho_compras
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: carrinho-compras-api
    restart: unless-stopped

    build:
      context: .
      dockerfile: src/CarrinhoCompras.Api/Dockerfile

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__PostgreSql: >-
        Host=postgres;
        Port=5432;
        Database=carrinho_compras;
        Username=carrinho;
        Password=carrinho_dev

    ports:
      - "5008:8080"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: carrinho-compras-frontend
    restart: unless-stopped

    build:
      context: .
      dockerfile: frontend/Dockerfile

    ports:
      - "5173:80"

    depends_on:
      - api

volumes:
  carrinho_compras_postgres_data: